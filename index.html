<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>
    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Librería para tomar capturas de pantalla -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a0b2e 0%, #00529b 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* Contenedor principal que se convertirá en imagen */
        #quiniela-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Encabezado */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #ddd;
            margin-top: 5px;
        }

        /* Sección Campeón */
        .campeon-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .campeon-section select {
            width: 100%;
            max-width: 350px;
            padding: 12px 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        /* Grid de Grupos */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .group-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            transition: transform 0.2s;
        }

        .group-card:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .group-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Opciones de equipos */
        .team-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .team-option:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        .team-option input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: #00f2fe;
            cursor: pointer;
        }

        .flag {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        .team-name {
            font-weight: 400;
            font-size: 1rem;
        }

        /* Nombre del participante */
        .user-info {
            margin-bottom: 20px;
            text-align: center;
        }

        .user-info input {
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            max-width: 350px;
            text-align: center;
            font-weight: 600;
        }

        /* Botón Flotante/Fijo para descargar */
        .actions {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .btn-descargar {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #1a0b2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-descargar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>

<script>
    // 1. Limitar a máximo 2 checkboxes seleccionados por grupo
    const grupos = ['grupoA', 'grupoB', 'grupoC', 'grupoD', 'grupoE', 'grupoF', 'grupoG', 'grupoH', 'grupoI', 'grupoJ', 'grupoK', 'grupoL']; // Agrega las letras si metes más grupos

    grupos.forEach(grupo => {
        const checkboxes = document.querySelectorAll(`.chk-${grupo}`);
        checkboxes.forEach(chk => {
            chk.addEventListener('change', function() {
                const checkedCount = document.querySelectorAll(`.chk-${grupo}:checked`).length;
                if (checkedCount > 2) {
                    this.checked = false;
                    alert('Solo pasan 2 por grupo, we.');
                }
            });
        });
    });

    // 2. Función para tomar screenshot del div principal y descargar
    function descargarCaptura() {
        const nombre = document.getElementById('nombreParticipante').value;
        const campeon = document.getElementById('campeon').value;
        
        if(!nombre) {
            alert("¡Pon tu nombre primero para saber de quién es la quiniela!");
            return;
        }
        if(!campeon) {
            alert("¡No olvides seleccionar al campeón del mundo!");
            return;
        }

        const contenedor = document.getElementById('quiniela-container');
        
        // Usamos html2canvas
        html2canvas(contenedor, {
            backgroundColor: "#1a0b2e", // Fondo para que no salga transparente
            scale: 2 // Para que tenga buena calidad la imagen
        }).then(canvas => {
            // Convertir el canvas a un Data URL
            const imgData = canvas.toDataURL("image/png");
            
            // Crear un enlace temporal para forzar la descarga
            const enlace = document.createElement('a');
            enlace.href = imgData;
            // El archivo llevará el nombre del participante
            enlace.download = `Quiniela_${nombre.replace(/\s+/g, '_')}.png`; 
            
            document.body.appendChild(enlace);
            enlace.click();
            document.body.removeChild(enlace);
        });
    }
</script>
