<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quiniela</title>
    <style>
        body { background-color: #050d1a; color: #00ffff; font-family: Arial; padding: 20px; }
        .card { background: #020c26; border: 1px solid #d4af37; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px; font-size: 16px; }
        button { background: #00ffff; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;}
        .partido-list { display: flex; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>
    <h1>Panel de Administración (CRUD)</h1>

    <div class="card">
        <h3>1. Dar de alta partido</h3>
        <input type="text" id="fase" placeholder="Fase (Ej. Octavos)">
        <input type="text" id="local" placeholder="Local (Ej. México)">
        <input type="text" id="flagL" placeholder="Bandera Local (🇲🇽)">
        <input type="text" id="visita" placeholder="Visita (Ej. Alemania)">
        <input type="text" id="flagV" placeholder="Bandera Visita (🇩🇪)">
        <button id="btn-crear">Guardar Partido Abierto</button>
    </div>

    <div class="card">
        <h3>2. Partidos Activos (Meter marcador real y cerrar)</h3>
        <div id="lista-admin" class="partido-list">Cargando...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ¡Pega aquí tu firebaseConfig!
        const firebaseConfig = {
            apiKey: "AIzaSyBwlXIhv5y-tEzvJ3kECF_AAPEyctZk4ak",
            authDomain: "quiniela-2026-f2660.firebaseapp.com",
            projectId: "quiniela-2026-f2660"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CREATE: Crear partido
        document.getElementById('btn-crear').addEventListener('click', async () => {
            await addDoc(collection(db, "partidos"), {
                fase: document.getElementById('fase').value,
                equipo_local: document.getElementById('local').value,
                bandera_local: document.getElementById('flagL').value,
                equipo_visita: document.getElementById('visita').value,
                bandera_visita: document.getElementById('flagV').value,
                apuestas_abiertas: true, // Esto hace que aparezca en el index
                marcador_local: -1,
                marcador_visita: -1,
                estatus: "pendiente"
            });
            alert("Partido creado");
            cargarAdminPartidos();
        });

        // READ: Cargar partidos en la vista admin
        async function cargarAdminPartidos() {
            const div = document.getElementById('lista-admin');
            div.innerHTML = "";
            const q = query(collection(db, "partidos"), where("estatus", "==", "pendiente"));
            const snapshot = await getDocs(q);

            snapshot.forEach(docSnap => {
                const p = docSnap.data();
                div.innerHTML += `
                    <div style="border: 1px solid #00ffff; padding: 10px; border-radius: 5px;">
                        <strong>${p.fase}: ${p.equipo_local} vs ${p.equipo_visita}</strong><br>
                        Goles Local: <input type="number" id="realL_${docSnap.id}" style="width:50px;">
                        Goles Visita: <input type="number" id="realV_${docSnap.id}" style="width:50px;">
                        <br><br>
                        <button onclick="cerrarPartido('${docSnap.id}')" style="background:#ff4444; color:white;">Cerrar Apuestas y Guardar Final</button>
                    </div>
                `;
            });
        }

        // UPDATE: Actualizar con marcador real y cerrar apuestas
        window.cerrarPartido = async function(id) {
            const golesL = parseInt(document.getElementById(`realL_${id}`).value);
            const golesV = parseInt(document.getElementById(`realV_${id}`).value);
            
            if (isNaN(golesL) || isNaN(golesV)) return alert("Pon el marcador oficial primero.");

            const partidoRef = doc(db, "partidos", id);
            await updateDoc(partidoRef, {
                marcador_local: golesL,
                marcador_visita: golesV,
                apuestas_abiertas: false, // Desaparece del index para los usuarios
                estatus: "finalizado"
            });
            alert("Partido cerrado y actualizado en la DB. ¡Listo para calcular puntos!");
            cargarAdminPartidos();
        }

        cargarAdminPartidos();
    </script>
</body>
</html>
